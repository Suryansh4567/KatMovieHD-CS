name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - "*.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: "src"
          fetch-depth: 0

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"
          fetch-depth: 0
        continue-on-error: true

      - name: Bootstrap builds branch if missing
        run: |
          if [ ! -d "$GITHUB_WORKSPACE/builds/.git" ]; then
            echo "Creating fresh builds branch..."
            mkdir -p "$GITHUB_WORKSPACE/builds"
            cd "$GITHUB_WORKSPACE/builds"
            git init -b builds
            git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
            git config user.email "actions@github.com"
            git config user.name  "GitHub Actions"
            echo "# Builds branch for ${GITHUB_REPOSITORY}" > README.md
            git add README.md
            git commit -m "Initial builds branch"
          fi

      - name: Clean previous artifacts
        run: |
          cd "$GITHUB_WORKSPACE/builds"
          find . -maxdepth 1 -type f -name "*.cs3" -delete
          find . -maxdepth 1 -type f -name "*.jar" -delete

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v2-${{ runner.os }}-${{ hashFiles('src/**/*.gradle*', 'src/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build plugins
        id: build_plugins
        continue-on-error: true
        run: |
          cd "$GITHUB_WORKSPACE/src"
          chmod +x gradlew
          set -o pipefail
          ./gradlew --no-daemon makePluginsJson --stacktrace 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"
          build_exit=${PIPESTATUS[0]}
          find . -type f -name "*.cs3" -exec cp {} "$GITHUB_WORKSPACE/builds/" \;
          [ -f build/plugins.json ] && cp build/plugins.json "$GITHUB_WORKSPACE/builds/plugins.json" || true
          [ -f repo.json ] && cp repo.json "$GITHUB_WORKSPACE/builds/repo.json" || true
          echo "------ Builds directory ------"
          ls -la "$GITHUB_WORKSPACE/builds/"
          exit $build_exit

      - name: Show Gradle log tail
        if: always()
        run: |
          echo "------ gradle-build.log (tail -200) ------"
          if [ -f "$GITHUB_WORKSPACE/gradle-build.log" ]; then
            tail -n 200 "$GITHUB_WORKSPACE/gradle-build.log"
            {
              echo "## Gradle log tail"
              echo '```'
              tail -n 200 "$GITHUB_WORKSPACE/gradle-build.log"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "gradle-build.log missing"
            echo "gradle-build.log missing" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: ${{ github.workspace }}/gradle-build.log
          if-no-files-found: warn

      - name: Fail workflow if Gradle build failed
        if: steps.build_plugins.outcome == 'failure'
        run: exit 1

      - name: Publish to builds branch
        run: |
          cd "$GITHUB_WORKSPACE/builds"
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing changed, skipping push."
            exit 0
          fi
          git commit -m "Build ${GITHUB_SHA::7}"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" HEAD:builds --force
